<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gauge Library CSV Viewer</title>
  <style>
    body { font-family: system-ui, -apple-system, Arial, sans-serif; margin: 20px; }
    .controls { margin-bottom: 12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    th { background: #f3f4f6; position: sticky; top: 0; z-index: 2; }
    input.col-filter { width: 100%; box-sizing: border-box; padding:6px; }
    .notice { color:#666; font-size:0.9rem }
    #status { margin-top:8px; }
    .small { font-size:0.9rem }
    /* Hover preview bubble */
    .hover-preview {
      position: fixed;
      pointer-events: none;
      background: rgba(0,0,0,0.8);
      padding: 6px;
      border-radius: 6px;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hover-preview img { max-width: 300px; max-height: 300px; display:block; }

  /* Thumbnail cell: square crop */
  .thumb-wrap { width: 60px; height: 60px; overflow: hidden; display:inline-block; border-radius:4px; background:#fff; }
  .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }

    /* Modal full-preview */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      background: #111;
      padding: 4px; /* reduced padding to make the visual "border" thinner */
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08); /* subtle thin border */
      box-shadow: 0 6px 18px rgba(0,0,0,0.45);
    }
    .modal-content img { display:block; max-width: 90vw; max-height: 80vh; }
    .modal-close {
      position: absolute;
      top: 6px;
      right: 8px;
      background: rgba(255,255,255,0.9);
      border: none;
      font-weight: bold;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h2>Gauge Library CSV Viewer</h2>
  <div class="controls">
    <label class="small">Select library folder: <input id="folderInput" type="file" webkitdirectory directory multiple /></label>
    <button id="clearFilters">Clear filters</button>
    <div style="flex:1"></div>
    <div class="notice">Select the top-level library folder. The viewer will load the CSV inside that folder and enable per-row downloads.</div>
  </div>

  <div id="status"></div>
  <div id="tableWrap"></div>

<script>
// Robust-ish CSV parser that supports quoted fields and commas/newlines inside quotes
function parseCSV(text) {
  const rows = [];
  let i = 0;
  const len = text.length;
  let cur = [];
  let field = '';
  let inQuotes = false;

  while (i < len) {
    const ch = text[i];

    if (inQuotes) {
      if (ch === '"') {
        if (i+1 < len && text[i+1] === '"') { // escaped quote
          field += '"';
          i += 2;
          continue;
        } else {
          inQuotes = false;
          i++;
          continue;
        }
      } else {
        field += ch;
        i++;
        continue;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
        i++;
        continue;
      }
      if (ch === ',') {
        cur.push(field);
        field = '';
        i++;
        continue;
      }
      if (ch === '\r') { i++; continue; }
      if (ch === '\n') {
        cur.push(field);
        field = '';
        rows.push(cur);
        cur = [];
        i++;
        continue;
      }
      field += ch;
      i++;
    }
  }
  // push remaining
  if (inQuotes) {
    // malformed but push what we have
  }
  cur.push(field);
  if (cur.length > 1 || cur[0] !== '') rows.push(cur);
  return rows;
}

function createTable(data) {
  const wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '';
  if (!data || data.length === 0) return;
  const headers = data[0];
  const rows = data.slice(1);

  // Determine which column contains the file path (common header names)
  const filePathCol = headers.findIndex(h => String(h).toLowerCase().includes('file_path') || String(h).toLowerCase().includes('file path') || String(h).toLowerCase().includes('file'));

  const table = document.createElement('table');

  // Header row with titles
  const thead = document.createElement('thead');
  const titleRow = document.createElement('tr');
  headers.forEach((h, idx) => {
    const th = document.createElement('th');
    th.textContent = h;
    titleRow.appendChild(th);
    // insert thumbnail header immediately after the File_Path column
    if (idx === filePathCol) {
      const thThumb = document.createElement('th');
      thThumb.textContent = 'Thumb';
      titleRow.appendChild(thThumb);
    }
  });
  // extra header for download button at the end
  const thExtra = document.createElement('th');
  thExtra.textContent = 'Download';
  titleRow.appendChild(thExtra);
  thead.appendChild(titleRow);

  // Filter inputs row
  const filterRow = document.createElement('tr');
  const filters = [];
  headers.forEach((h, colIdx) => {
    const th = document.createElement('th');
    const input = document.createElement('input');
    input.placeholder = 'Filter...';
    input.className = 'col-filter';
    input.dataset.col = colIdx;
    input.addEventListener('input', applyFilters);
    th.appendChild(input);
    filterRow.appendChild(th);
    filters.push(input);
    // add an empty filter cell for the thumbnail column if this is the File_Path column
    if (colIdx === filePathCol) {
      const thumbFilter = document.createElement('th');
      filterRow.appendChild(thumbFilter);
    }
  });
  // empty filter cell for download column
  const extraTh = document.createElement('th');
  filterRow.appendChild(extraTh);
  thead.appendChild(filterRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  rows.forEach(r => {
    const tr = document.createElement('tr');
    headers.forEach((h, c) => {
      const td = document.createElement('td');
      td.textContent = r[c] !== undefined ? r[c] : '';
      tr.appendChild(td);
      // after the File_Path column, insert a thumbnail cell
      if (c === filePathCol) {
        const thumbTd = document.createElement('td');
        // create img placeholder
  const wrap = document.createElement('div');
  wrap.className = 'thumb-wrap';
  const img = document.createElement('img');
  img.alt = 'thumb';
  img.style.display = 'none';
  wrap.appendChild(img);
  thumbTd.appendChild(wrap);
        tr.appendChild(thumbTd);
        // find thumbnail and set src if available
        const filePathVal = (filePathCol >= 0 && r[filePathCol] !== undefined) ? r[filePathCol] : null;
        const thumbFile = findThumbnailFile(filePathVal);
        if (thumbFile) {
          try {
            const url = URL.createObjectURL(thumbFile);
            img.src = url;
            img.style.display = '';
            // hover -> show larger preview; click -> open modal
            // attach events to the wrapper so hover location aligns with the square
            wrap.addEventListener('mouseenter', (ev) => {
              try { showHoverPreview(img.src, wrap.getBoundingClientRect()); } catch(e){}
            });
            wrap.addEventListener('mouseleave', () => { try { hideHoverPreview(); } catch(e){} });
            wrap.addEventListener('click', () => { try { showModal(img.src); } catch(e){} });
          } catch (err) {
            // ignore
          }
        }
      }
    });
    // download button cell
    const dltd = document.createElement('td');
    const dlbtn = document.createElement('button');
    dlbtn.textContent = 'Download';
    dlbtn.className = 'dl-btn';
    // capture file path value for this row
    const filePathVal = (filePathCol >= 0 && r[filePathCol] !== undefined) ? r[filePathCol] : null;
    dlbtn.addEventListener('click', () => handleDownloadClick(filePathVal));
    dltd.appendChild(dlbtn);
    tr.appendChild(dltd);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);

  // store references for filtering
  table._filters = filters;
  table._tbody = tbody;
}

// Create hover preview element (singleton)
function ensureHoverPreview() {
  let el = document.getElementById('hoverPreview');
  if (!el) {
    el = document.createElement('div');
    el.id = 'hoverPreview';
    el.className = 'hover-preview';
    el.style.display = 'none';
    document.body.appendChild(el);
  }
  return el;
}

function showHoverPreview(src, targetRect) {
  const el = ensureHoverPreview();
  el.innerHTML = '';
  const img = document.createElement('img');
  img.src = src;
  el.appendChild(img);
  el.style.display = 'flex';
  // position near target rect, try above or below depending on space
  const pad = 8;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const rect = targetRect;
  // default below
  let left = rect.right + pad;
  let top = rect.top;
  // if overflowing right, place to left
  if (left + 320 > vw) left = rect.left - 320 - pad;
  if (left < 0) left = pad;
  // if overflowing bottom, shift up
  if (top + 320 > vh) top = vh - 320 - pad;
  if (top < 0) top = pad;
  el.style.left = left + 'px';
  el.style.top = top + 'px';
}

function hideHoverPreview() {
  const el = document.getElementById('hoverPreview');
  if (el) el.style.display = 'none';
}

// Modal preview
function ensureModal() {
  let m = document.getElementById('modalOverlay');
  if (!m) {
    m = document.createElement('div');
    m.id = 'modalOverlay';
    m.className = 'modal-overlay';
    m.innerHTML = `
      <div class="modal-content" role="dialog">
        <button class="modal-close" aria-label="Close">X</button>
        <img src="" alt="preview" />
      </div>`;
    document.body.appendChild(m);
    // wiring
    m.addEventListener('click', (ev) => {
      // close when clicking outside content
      if (ev.target === m) hideModal();
    });
    m.querySelector('.modal-close').addEventListener('click', hideModal);
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape') hideModal();
    });
  }
  return m;
}

function showModal(src) {
  const m = ensureModal();
  const img = m.querySelector('img');
  img.src = src;
  m.style.display = 'flex';
}

function hideModal() {
  const m = document.getElementById('modalOverlay');
  if (!m) return;
  const img = m.querySelector('img');
  img.src = '';
  m.style.display = 'none';
}

function applyFilters() {
  const table = document.querySelector('#tableWrap table');
  if (!table) return;
  const filters = table._filters;
  const tbody = table._tbody;
  const rows = Array.from(tbody.rows);

  rows.forEach(row => {
    let visible = true;
    filters.forEach((inp, colIdx) => {
      const val = inp.value.trim().toLowerCase();
      if (!val) return;
      const cell = row.cells[colIdx];
      const text = cell ? (cell.textContent || '').toLowerCase() : '';
      if (!text.includes(val)) visible = false;
    });
    row.style.display = visible ? '' : 'none';
  });
}

function clearFilters() {
  const table = document.querySelector('#tableWrap table');
  if (!table) return;
  table._filters.forEach(f => f.value = '');
  applyFilters();
}

// --- Library folder handling ---
let libraryFilesByBasename = {};
let libraryFilesByRelpath = {};

function handleFolderSelection(files) {
  libraryFilesByBasename = {};
  libraryFilesByRelpath = {};
  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    const rel = f.webkitRelativePath || f.name;
    libraryFilesByRelpath[rel] = f;
    const name = f.name;
    if (!libraryFilesByBasename[name]) libraryFilesByBasename[name] = [];
    libraryFilesByBasename[name].push(f);
  }
  const status = document.getElementById('status');
  status.textContent = `Loaded library folder with ${Object.keys(libraryFilesByRelpath).length} files`;

  // Attempt to find a CSV index inside the selected library. Prefer a file
  // named like the common index filename, otherwise pick the first .csv found.
  const preferred = 'test_gauge_master_index.csv';
  let csvFile = null;
  if (libraryFilesByRelpath[preferred]) csvFile = libraryFilesByRelpath[preferred];
  if (!csvFile) {
    // try any file whose name ends with .csv
    for (const rel in libraryFilesByRelpath) {
      if (rel.toLowerCase().endsWith('.csv')) { csvFile = libraryFilesByRelpath[rel]; break; }
    }
  }
  if (csvFile) {
    // read and parse CSV then create table
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const csv = parseCSV(reader.result);
        createTable(csv);
        status.textContent = `Loaded CSV from library: ${csvFile.name} (${csv.length-1} rows)`;
      } catch (err) {
        status.textContent = 'Error parsing CSV from library: ' + err;
      }
    };
    reader.onerror = () => { status.textContent = 'Failed to read CSV from library'; };
    reader.readAsText(csvFile);
  } else {
    status.textContent = 'No CSV found inside selected library folder';
  }
}

document.getElementById('folderInput').addEventListener('change', (e) => {
  const files = e.target.files;
  if (!files || files.length === 0) return;
  handleFolderSelection(files);
});

async function handleDownloadClick(filePathVal) {
  const status = document.getElementById('status');
  if (!filePathVal) {
    status.textContent = 'No File_Path value for this row';
    return;
  }

  // If no library selected, prompt the user
  if (Object.keys(libraryFilesByRelpath).length === 0) {
    status.textContent = 'Please select the library folder first using "Select library folder".';
    return;
  }

  // Try exact relative path match first
  if (libraryFilesByRelpath[filePathVal]) {
    triggerDownload(libraryFilesByRelpath[filePathVal]);
    return;
  }

  // Try matching by endsWith relative path
  for (const rel in libraryFilesByRelpath) {
    if (rel.endsWith(filePathVal)) {
      triggerDownload(libraryFilesByRelpath[rel]);
      return;
    }
  }

  // Try basename match
  const base = filePathVal.split('/').pop();
  const candidates = libraryFilesByBasename[base];
  if (candidates && candidates.length > 0) {
    // if multiple candidates, pick the first
    triggerDownload(candidates[0]);
    return;
  }

  status.textContent = `File not found in selected library: ${filePathVal}`;
}

function triggerDownload(fileObj) {
  const status = document.getElementById('status');
  try {
    const url = URL.createObjectURL(fileObj);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileObj.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    status.textContent = `Triggered download: ${fileObj.name}`;
  } catch (err) {
    status.textContent = `Download failed: ${err}`;
  }
}

// Find a thumbnail file (template_image.png) for a given File_Path value.
function findThumbnailFile(filePathVal) {
  if (!filePathVal) return null;
  // The library structure places files inside a folder named after the file's base name
  // (filename without extension). Derive folder name and look for template_image.png inside.
  const folderName = filePathVal.replace(/\.vgc$/i, '');

  // Try exact relpath match first: any rel that ends with `${folderName}/template_image.png`
  const suffix = `/${folderName}/template_image.png`;
  for (const rel in libraryFilesByRelpath) {
    if (rel.toLowerCase().endsWith(suffix.toLowerCase())) return libraryFilesByRelpath[rel];
  }

  // Try any png inside that folder
  for (const rel in libraryFilesByRelpath) {
    const low = rel.toLowerCase();
    if (low.includes(`/${folderName.toLowerCase()}/`) && low.endsWith('.png') && !low.includes('mask')) {
      return libraryFilesByRelpath[rel];
    }
  }

  // As a last resort, try to find a 'template_image.png' by basename
  const candidates = libraryFilesByBasename['template_image.png'];
  if (candidates && candidates.length) return candidates[0];

  return null;
}

// Load CSV from a File object (file input)
function loadFromFile(file) {
  const status = document.getElementById('status');
  status.textContent = 'Reading file...';
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const csv = parseCSV(reader.result);
      createTable(csv);
      status.textContent = `Loaded ${file.name} (${csv.length-1} rows)`;
    } catch (err) {
      status.textContent = 'Error parsing CSV: ' + err;
    }
  };
  reader.onerror = () => status.textContent = 'Failed to read file';
  reader.readAsText(file);
}

// Try to fetch CSV from an absolute path or relative URL
async function loadFromPath(path) {
  const status = document.getElementById('status');
  status.textContent = 'Fetching ' + path + ' ...';
  try {
    const resp = await fetch(path);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const csv = parseCSV(text);
    createTable(csv);
    status.textContent = `Loaded ${path} (${csv.length-1} rows)`;
  } catch (err) {
    status.innerHTML = `Failed to load path: ${err}.<br/>If this is a local file, the browser may block direct file access. Use the file picker above or run a local server in the library folder, e.g.:<br/><code>cd /Users/elizayas/Downloads/gauge_configuration_library_draft && python -m http.server</code>`;
  }
}

// Wire UI
document.getElementById('clearFilters').addEventListener('click', clearFilters);

// Note: folderInput wiring is above where handleFolderSelection is defined.
</script>
</body>
</html>
